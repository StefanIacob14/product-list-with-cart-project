<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/src/style.css" />

    <link rel="icon" href="favicon-32x32.png" />
    <title>Product list with cart project | Frontend Mentor</title>
  </head>

  <body
    class="font-redhat relative flex h-dvh w-dvw flex-col gap-10 bg-rose-50 px-5 py-6"
  >
    <!-- HEADER -->
    <header>
      <h1 class="text-4xl font-bold">Desserts</h1>
    </header>

    <!-- MAIN -->
    <main>
      <!-- Product Grid List -->
      <section id="product-grid" class="mb-10 grid grid-cols-1 gap-5"></section>

      <!-- Cart -->
      <aside
        class="mb-10 flex h-auto w-full flex-col items-center justify-center gap-5 rounded-xl bg-white px-5 py-6"
      >
        <!-- Cart Header -->
        <header class="self-start">
          <h2 class="text-2xl font-bold text-rose-900">
            Your Cart (<span id="cart-count">0</span>)
          </h2>
        </header>

        <!-- Cart Selected Items Unordered List (where JS will inject the list items) -->
        <main>
          <ul id="cart-items" class="flex w-full flex-col"></ul>
        </main>

        <!-- Cart Footer (with Total + Confirmation Button) -->
        <footer id="cart-footer" class="mt-5 size-full">
          <div class="flex flex-col gap-8">
            <!-- Cart Footer Total -->
            <div class="flex items-center justify-between">
              <p class="text-[0.9rem]">Order Total</p>
              <p id="cart-total" class="text-2xl font-bold">$0.00</p>
            </div>

            <!-- Cart Footer message -->
            <div
              class="flex items-center gap-2 self-center rounded-xl bg-rose-50 px-7 py-3"
            >
              <img id="carbon-neutral-icon" alt="carbon-neutral" />
              <p class="text-[0.9rem]">
                This is a
                <span class="font-semibold">carbon-neutral</span> delivery
              </p>
            </div>

            <!-- Cart Footer Confirmation Button -->
            <button
              id="cart-confirm-button"
              class="rounded-full bg-red-800/90 py-3 text-[0.91rem] font-semibold text-white"
            >
              Confirm Order
            </button>
          </div>
        </footer>
      </aside>
    </main>

    <!-- Overlay -->
    <div
      id="overlay"
      class="fixed top-0 left-0 z-10 hidden h-dvh w-dvw bg-black opacity-50"
    ></div>

    <!-- Confirmation Modal Window -->
    <section
      id="modal-window"
      class="fixed bottom-0 left-0 z-20 hidden h-[90dvh] w-dvw rounded-t-xl bg-white px-5 py-6"
    >
      <div class="flex flex-col items-center justify-between gap-7">
        <header class="flex flex-col items-center gap-4">
          <img
            id="icon-order-confirmed"
            class="size-10"
            alt="Order Confirmed Icon"
          />
          <h2 class="text-4xl font-bold">Order Confirmed!</h2>
          <p
            class="text-[0.9rem] font-semibold text-rose-950 italic opacity-40"
          >
            We hope you enjoy your food!
          </p>
        </header>

        <div class="w-[85dvw] rounded-xl bg-rose-50 p-5">
          <ul id="modal-items" class="max-h-[32dvh] overflow-y-scroll"></ul>

          <div class="mt-5 flex items-center justify-between font-semibold">
            <span class="text-[0.9rem]">Order Total</span>
            <span id="modal-total" class="text-[1.5rem] font-bold">$0.00</span>
          </div>
        </div>

        <footer>
          <button
            id="start-new-order-button"
            class="rounded-full bg-red-800/90 px-26.5 py-3 text-[0.91rem] font-semibold text-white"
          >
            Start New Order
          </button>
        </footer>
      </div>
    </section>

    <!-- JavaScript file -->
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
