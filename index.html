<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/src/style.css" />

    <link rel="icon" href="favicon-32x32.png" />
    <title>Product list project | Frontend Mentor</title>
  </head>

  <body
    class="relative flex flex-col gap-10 px-5 py-6 h-dvh w-dvw font-redhat bg-rose-50 overflow-hidden"
  >
    <!-- HEADER -->
    <header>
      <h1 class="font-bold text-4xl">Desserts</h1>
    </header>

    <!-- MAIN -->
    <main>
      <!-- Product List -->
      <section></section>

      <!-- Cart -->
      <article
        class="flex flex-col gap-6 items-center justify-center size-full bg-white rounded-xl px-5 pt-6 pb-10"
      >
        <h2 class="font-bold self-start text-2xl text-rose-800">
          Your Cart (<span>0</span>)
        </h2>
        <img id="empty-cart-img" alt="Cart Default Image" />
        <p class="font-semibold text-[0.8rem] text-rose-950 opacity-60">
          Your added items will appear here
        </p>
      </article>
    </main>

    <!-- Overlay -->
    <div
      id="overlay"
      class="invisible absolute z-10 top-0 left-0 h-dvh w-dvw bg-black opacity-50"
    ></div>

    <!-- Confirmation Modal Window -->
    <section
      class="invisible absolute z-20 bottom-0 left-0 bg-white w-dvw h-[88dvh] rounded-t-xl px-5 py-6 flex flex-col items-center justify-between gap-1"
    >
      <header class="flex flex-col items-center gap-4">
        <img
          id="icon-order-confirmed"
          class="size-10"
          alt="Order Confirmed Icon"
        />
        <h2 class="font-bold text-4xl">Order Confirmed!</h2>
        <p class="font-semibold italic text-[0.9rem] text-rose-950 opacity-40">
          We hope you enjoy your food!
        </p>
      </header>

      <main class="bg-rose-100 h-[45dvh] w-[90dvw] rounded-xl"></main>

      <footer>
        <button
          class="bg-red-800/90 text-white text-[0.91rem] py-3 px-28.5 rounded-full"
        >
          Start New Order
        </button>
      </footer>
    </section>

    <!-- JavaScript file -->
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
