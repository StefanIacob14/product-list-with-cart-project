<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/src/style.css" />

    <link rel="icon" href="favicon-32x32.png" />
    <title>Product list project | Frontend Mentor</title>
  </head>

  <body
    class="relative flex flex-col gap-10 px-5 py-6 h-dvh w-dvw font-redhat bg-rose-50"
  >
    <!-- HEADER -->
    <header>
      <h1 class="font-bold text-4xl">Desserts</h1>
    </header>

    <!-- MAIN -->
    <main>
      <!-- Product Grid List -->
      <section id="product-grid" class="grid grid-cols-1 gap-5 mb-10"></section>

      <!-- Cart -->
      <aside
        class="flex flex-col gap-5 items-center justify-center w-full h-auto mb-10 bg-white rounded-xl px-5 py-6"
      >
        <!-- Cart Header -->
        <header class="self-start">
          <h2 class="font-bold text-2xl text-rose-800">
            Your Cart (<span id="cart-count">0</span>)
          </h2>
        </header>

        <!-- Cart Selected Items Unordered List (where JS will inject the list items) -->
        <main>
          <ul
            id="cart-items"
            class="w-full mt-5 flex flex-col justify-star"
          ></ul>
        </main>

        <!-- Cart Footer (with Total + Confirmation Button) -->
        <footer id="cart-footer" class="size-full mt-5">
          <div class="flex flex-col gap-8">
            <!-- Cart Footer Total -->
            <div class="flex items-center justify-between">
              <p class="text-[0.9rem]">Order Total</p>
              <p id="cart-total" class="font-bold text-2xl">$0.00</p>
            </div>

            <!-- Cart Footer message -->
            <div
              class="flex gap-2 items-center self-center bg-rose-50 px-7 py-3 rounded-xl"
            >
              <img id="carbon-neutral-icon" alt="carbon-neutral" />
              <p class="text-[0.9rem]">
                This is a
                <span class="font-semibold">carbon-neutral</span> delivery
              </p>
            </div>

            <!-- Cart Footer Confirmation Button -->
            <button
              id="cart-confirm-button"
              class="bg-red-800/90 text-white font-semibold text-[0.91rem] rounded-full py-3"
            >
              Confirm Order
            </button>
          </div>
        </footer>
      </aside>
    </main>

    <!-- Overlay -->
    <div
      id="overlay"
      class="hidden fixed z-10 top-0 left-0 h-dvh w-dvw bg-black opacity-50"
    ></div>

    <!-- Confirmation Modal Window -->
    <section
      id="modal-window"
      class="hidden fixed z-20 bottom-0 left-0 bg-white w-dvw h-[88dvh] rounded-t-xl px-5 py-6"
    >
      <div class="flex flex-col items-center justify-between gap-7">
        <header class="flex flex-col items-center gap-4">
          <img
            id="icon-order-confirmed"
            class="size-10"
            alt="Order Confirmed Icon"
          />
          <h2 class="font-bold text-4xl">Order Confirmed!</h2>
          <p
            class="font-semibold italic text-[0.9rem] text-rose-950 opacity-40"
          >
            We hope you enjoy your food!
          </p>
        </header>

        <ul id="modal-items" class="mt-6 divide-y divide-rose-100"></ul>

        <div class="flex justify-between font-semibold text-lg py-4">
          <span class="mr-2">Order Total</span>
          <span id="modal-total">$0.00</span>
        </div>

        <footer>
          <button
            id="start-new-order-button"
            class="bg-red-800/90 text-white font-semibold text-[0.91rem] py-3 px-27.5 rounded-full"
          >
            Start New Order
          </button>
        </footer>
      </div>
    </section>

    <!-- JavaScript file -->
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
